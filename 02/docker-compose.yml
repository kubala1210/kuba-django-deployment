services:
  web:
    build: .
    env_file:
      - .env
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/mediafiles
    command: gunicorn --pythonpath project project.wsgi:application --bind 0.0.0.0:8000
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/mediafiles
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web

volumes:
  static_data:
  media_data: